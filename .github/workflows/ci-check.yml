name: automation-os-check

on:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run baseline checks
        run: |
          set -o pipefail
          bash scripts/check.sh | tee ci-check.log

      - name: Upload check log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-os-check-log
          path: ci-check.log
          if-no-files-found: error
