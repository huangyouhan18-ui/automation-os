name: automation-os-check

on:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automation-os
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run baseline checks
        run: bash scripts/check.sh
